name: Docs - PR

# This doesn't actually deploy, just builds the docs folder when it's modified.

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/docusaurus-pr.yml
      - "docs/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  test-build:
    name: Test build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc

      - name: Use npm 11 when npm 12 is preinstalled
        shell: bash
        run: |
          npm_version="$(npm --version)"
          echo "Detected npm ${npm_version}"
          if [[ "${npm_version%%.*}" == "12" ]]; then
            npm i -g npm@11
          fi
          echo "Using npm $(npm --version)"

      - run: yarn --immutable
        working-directory: docs

      - name: Build website
        working-directory: docs
        run: yarn build
